<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Squid Game Assignment 3</title>

  <!-- FONT AWESOME -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="./favicon.png" type="image/x-icon">
</head>
<body>

  <div class="container">

    <!-- BACKGROUND TEXT -->
    <h1 class="bg-game">GAME</h1>
    <h1 class="bg-squid">SQUID</h1>

    <!-- NAVBAR -->
    <nav class="navbar">

      <div class="logo-small">
        <img src="logo.png" alt="">
      </div>

      <ul class="nav-links">
        <li>About</li>
        <li class="active">Watch now</li>
        <li>Actors</li>
        <li>Contact</li>
      </ul>

      <div class="menu-icon">
        <i class="fa-solid fa-bars"></i>
      </div>

    </nav>

    <!-- HERO SECTION -->
    <section class="hero-section">

      <!-- LEFT -->
      <div class="left-content">

        <img src="image.png" class="big-logo" alt="">

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br>
          Season 1: 9 Episodes
        </p>

        <div class="buttons">

          <button class="play-btn">
            <i class="fa-solid fa-play"></i>
            Play Now
          </button>

          <button class="trailer-btn">
            <i class="fa-solid fa-caret-right"></i>
            Watch Trailer
          </button>

        </div>

      </div>

      <!-- CENTER SCROLL -->
      <div class="scroll-text">
        <span>SCROLL</span>
        <div class="line"></div>
      </div>

      <!-- RIGHT -->
      <div class="right-content">

        <img src="RightSideImg.png" class="guard-img" alt="">

        <!-- SOCIAL -->
        <div class="social-icons">
          <i class="fa-brands fa-twitter"></i>
          <i class="fa-brands fa-instagram"></i>
          <i class="fa-brands fa-facebook-f"></i>
        </div>

      </div>

    </section>

    <!-- CARDS -->
    <section class="cards-section">

      <div class="card">
        <img src="card1.png" alt="">
        <div class="play-icon">
          <i class="fa-solid fa-play"></i>
        </div>
      </div>

      <div class="card">
        <img src="card2.png" alt="">
        <div class="play-icon">
          <i class="fa-solid fa-play"></i>
        </div>
      </div>

      <div class="card">
        <img src="card3.png" alt="">
        <div class="play-icon">
          <i class="fa-solid fa-play"></i>
        </div>
      </div>

    </section>

  </div>

</body>
</html>
