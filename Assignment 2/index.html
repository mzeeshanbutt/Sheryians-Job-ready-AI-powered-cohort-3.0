<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>ScaleX Assignment 2</title>
    <link
      rel="shortcut icon"
      href="./android-chrome-512x512.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="navbar">
      <div class="logo"><img src="./Logo.png" alt="" /></div>
      <div class="nav-links">
        <ul class="nav-list">
          <li><a href="#" id="homeScreenButton" class="nav-list">Home</a></li>
          <li>
            <a href="#" id="aboutUSScreenButton" class="nav-list">About Us</a>
          </li>
          <li><a href="#" id="blogsScreenButton" class="nav-list">Blogs</a></li>
          <li>
            <a href="#" id="contactUsScreenButton" class="nav-list"
              >Contact Us</a
            >
          </li>
        </ul>
      </div>
      <button class="getStartedButton">Get Started</button>
    </div>

    <section class="hero">
      <h1>Insights & Blogs</h1>
    </section>

    <section class="filter">
      <button class="btn active">All</button>
      <button class="btn">Tech</button>
      <button class="btn">SaaS</button>
      <button class="btn">Marketing</button>
    </section>

    <section class="cards">
      <div class="card" id="glassCard">
        <img src="glass.png" alt="techimage" />
        <span class="badge">Tech</span>
        <h3>The Ultimate guide To SaaS Marketing</h3>
        <p>May 23, 2026</p>
      </div>

      <div class="card">
        <img src="chair.png" alt="SaaSImage" />
        <span class="badge">SaaS</span>
        <h3>5b Key Trends in SaaS Growth For 2026</h3>
        <p>May 26, 2026</p>
      </div>

      <div class="card">
        <img src="cat.png" alt="MarketingImg" />
        <span class="badge">Marketing</span>
        <h3>How Data-Driven Strategies Are important</h3>
        <p>May 29, 2026</p>
      </div>
    </section>
  </body>
</html>
